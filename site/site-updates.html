<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/site-updates.css" />

        <title>site updates</title>
    </head>

    <body>
        <script src="js/lastfm.js" defer></script>

        <script>
            fetch("partials/sidebar.html")
                .then((res) => res.text())
                .then((data) => {
                    document.getElementById("sidebar").innerHTML = data;
                    console.log("Sidebar injected");

                    if (typeof initLastFM === "function") {
                        initLastFM();
                    }

                    fetch("data/status.json")
                        .then((res) => res.json())
                        .then((data) => {
                            const latest = data.statuses[0];
                            document.getElementById("status-text").textContent = latest.text;
                        });
                });
        </script>

        <script src="js/updates.js"></script>

        <div class="site-wrapper">
            <div class="layout">
                <header class="top-header">
                    <h1>☆ velosophy.neocities.org ☆</h1>
                </header>

                <div class="marquee">
                    <div class="marquee-content">
                        MAJOR WORK IN PROGRESS • MAJOR WORK IN PROGRESS • MAJOR WORK IN PROGRESS • MAJOR WORK IN
                        PROGRESS
                    </div>
                </div>

                <div class="container">
                    <div id="sidebar"></div>

                    <main class="right">
                        <h2>Site Updates</h2>
                        <hr />
                        <div id="updates-container" class="log-container"></div>
                    </main>
                </div>

                <footer class="site-footer">
                    <p>@avechuu 2026 // everyone is entitled to their own sorrows</p>
                </footer>
            </div>
        </div>
    </body>
</html>
